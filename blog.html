<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="N高・スクーリング・日常・進路・Web制作について書いたブログ記事一覧。Suiren Notes。">
  <title>Blog | Suiren Notes</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page page--blog">
  <header class="header">
    <div class="container header__inner">
      <a href="index.html" class="header__logo">
        <span class="header__logo-main">Suiren Notes</span>
        <span class="header__logo-sub">by 08nsuiren</span>
      </a>
      <nav class="nav" aria-label="メインナビゲーション">
        <a href="index.html" class="nav__link">Home</a>
        <a href="about.html" class="nav__link">About</a>
        <a href="blog.html" class="nav__link nav__link--active">Blog</a>
        <a href="works.html" class="nav__link">Works</a>
      </nav>
    </div>
  </header>

  <main class="page__main">
    <div class="container page-hero">
      <span class="page-hero__label">記録</span>
      <h1 class="page-hero__title">Blog</h1>
      <p class="page-hero__lead">ゆっくり書く、個人ログ。動画では話しきれなかったことを残していく。</p>
    </div>

    <section class="section container" aria-label="記事一覧">
      <div id="blog-filter" class="filter" aria-label="カテゴリフィルター"></div>
      <div id="blog-list">
        <p class="message message--loading">読み込み中</p>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer__inner">
      <div id="footer-tiktok" class="footer__tiktok" hidden></div>
      <span class="footer__mark">@08nsuiren</span>
      <p class="footer__copy">&copy; <span id="year"></span> Suiren Notes</p>
    </div>
  </footer>
  </div>

  <script src="js/config.js"></script>
  <script src="js/microcms.js"></script>
  <script src="js/footer.js"></script>
  <script src="js/header.js"></script>
  <script src="js/animations.js"></script>
  <script src="js/blog.js"></script>
</body>
</html>
